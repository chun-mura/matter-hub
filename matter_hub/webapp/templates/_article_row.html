<li class="article-row border rounded p-3 bg-white" id="row-{{ a.id }}">
  <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-2">
    <div class="min-w-0 flex-1">
      <a class="font-medium text-blue-700 hover:underline break-words text-base sm:text-base leading-snug" href="{{ a.url }}" target="_blank" rel="noopener">{{ a.title }}</a>
      <div class="text-sm sm:text-xs text-gray-500 mt-1 break-words">
        {% if a.author %}{{ a.author }}{% endif %}
        {% if a.publisher %} · {{ a.publisher }}{% endif %}
        {% if a.published_date %} · {{ a.published_date[:10] }}{% endif %}
      </div>
    </div>
    <div class="text-sm sm:text-xs flex gap-2 sm:shrink-0 self-end sm:self-start">
      {% if view == 'trash' %}
        <button class="px-3 py-1.5 bg-green-600 text-white rounded"
                hx-post="/articles/{{ a.id }}/restore"
                hx-target="#row-{{ a.id }}" hx-swap="outerHTML">restore</button>
      {% else %}
        <button class="px-3 py-1.5 bg-red-600 text-white rounded"
                hx-post="/articles/{{ a.id }}/delete"
                hx-target="#row-{{ a.id }}" hx-swap="outerHTML"
                hx-confirm="Delete this article?">delete</button>
      {% endif %}
    </div>
  </div>
</li>
