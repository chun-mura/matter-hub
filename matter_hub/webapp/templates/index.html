{% extends "base.html" %}
{% block body %}
<div class="max-w-6xl mx-auto p-3 sm:p-4">
  <header class="flex flex-wrap items-center justify-between gap-2 border-b border-gray-200 dark:border-gray-800 pb-2 mb-4">
    <h1 class="text-lg sm:text-xl font-semibold">Matter Hub</h1>
    <div class="flex flex-wrap items-center gap-2 text-sm sm:text-sm">
      <a class="px-3 py-1.5 rounded text-sm {% if view == 'active' %}bg-blue-600 text-white{% else %}bg-gray-200 dark:bg-gray-800 dark:text-gray-100{% endif %}" href="/?view=active">active</a>
      <a class="px-3 py-1.5 rounded text-sm {% if view == 'archived' %}bg-blue-600 text-white{% else %}bg-gray-200 dark:bg-gray-800 dark:text-gray-100{% endif %}" href="/?view=archived">archived</a>
      <a class="px-3 py-1.5 rounded text-sm {% if view == 'trend' %}bg-blue-600 text-white{% else %}bg-gray-200 dark:bg-gray-800 dark:text-gray-100{% endif %}" href="/?view=trend">trend</a>
      <a class="px-3 py-1.5 rounded text-sm {% if view == 'trash' %}bg-blue-600 text-white{% else %}bg-gray-200 dark:bg-gray-800 dark:text-gray-100{% endif %}" href="/?view=trash">trash</a>
      <span class="text-gray-500 dark:text-gray-400 text-sm">{{ total }} articles</span>
    </div>
    <div class="w-full">
      {% include "_sync_status.html" %}
    </div>
  </header>
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
    <aside class="md:col-span-1">
      <input type="text" placeholder="Search…"
             class="w-full border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 rounded px-3 py-2 text-base"
             name="q" value="{{ q }}"
             hx-get="/articles" hx-target="#article-list" hx-swap="innerHTML"
             hx-trigger="keyup changed delay:300ms"
             hx-include="[name=view],[name=tags]">
      <input type="hidden" name="view" value="{{ view }}">
      <input type="hidden" name="tags" value="{{ selected_tags|join(',') }}">
      <div class="mt-4 text-sm">
        <button type="button"
                class="md:hidden w-full py-2 px-2 bg-gray-100 dark:bg-gray-800 rounded font-medium text-base text-left flex justify-between items-center"
                aria-expanded="false"
                aria-controls="tag-filter"
                onclick="window.matterHub.toggleTagPanel(this)">
          <span>Tags</span>
          <span class="tag-chevron" aria-hidden="true">▸</span>
        </button>
        <div id="tag-filter" class="hidden md:block mt-2 md:mt-0">
          {% include "_tag_filter.html" %}
        </div>
      </div>
    </aside>
    <section class="md:col-span-3">
      <div id="article-list">
        {% include "_article_list.html" %}
      </div>
    </section>
  </div>
</div>
{% endblock %}
