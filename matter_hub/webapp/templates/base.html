<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matter Hub</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { darkMode: "class" };
    (function () {
      const root = document.documentElement;
      const systemDark = window.matchMedia("(prefers-color-scheme: dark)");
      const applySystemTheme = (isDark) => {
        root.classList.toggle("dark", isDark);
        root.style.colorScheme = isDark ? "dark" : "light";
      };
      applySystemTheme(systemDark.matches);
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/app.js" defer></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 text-base">
  {% block body %}{% endblock %}

  <div id="resummarize-confirm-modal"
       class="fixed inset-0 z-[100] hidden"
       role="dialog"
       aria-modal="true"
       aria-labelledby="resummarize-modal-title"
       aria-hidden="true">
    <div class="absolute inset-0 bg-black/50 dark:bg-black/60" data-resummarize-backdrop></div>
    <div class="relative flex min-h-full items-center justify-center p-4 pointer-events-none">
      <div class="pointer-events-auto w-full max-w-md rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 shadow-xl p-5 sm:p-6">
        <h2 id="resummarize-modal-title" class="text-base font-semibold text-gray-900 dark:text-gray-100">
          再要約の確認
        </h2>
        <p class="mt-3 text-sm text-gray-600 dark:text-gray-300 leading-relaxed">
          承認するとすぐに再要約が始まります。実行中は<strong class="font-medium text-gray-800 dark:text-gray-200">画面上の既存の要約は進捗表示に置き換わり</strong>、完了すると新しい要約で上書きされます。取り消しはできません。
        </p>
        <div class="mt-5 flex flex-wrap justify-end gap-2">
          <button type="button"
                  class="px-3 py-1.5 rounded text-sm border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 hover:bg-gray-50 dark:hover:bg-gray-700/50"
                  data-resummarize-cancel>
            キャンセル
          </button>
          <button type="button"
                  class="px-3 py-1.5 rounded text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-medium"
                  data-resummarize-confirm>
            再要約を開始
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
