<ul class="space-y-2">
  {% for a in articles %}
    {% include "_article_row.html" %}
  {% endfor %}
</ul>
{% if has_more %}
  <button class="mt-4 px-3 py-1 bg-gray-200 dark:bg-gray-800 dark:text-gray-100 rounded"
          hx-get="/articles?q={{ q }}&tags={{ selected_tags|join(',') }}&view={{ view }}&page={{ page + 1 }}"
          hx-target="this" hx-swap="outerHTML">Load more</button>
{% endif %}
