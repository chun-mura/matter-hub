<ul class="space-y-1">
  {% for name, cnt in tags_with_counts %}
    <li>
      <label class="flex items-center gap-2 cursor-pointer py-1.5 md:py-0.5 text-base md:text-sm">
        <input type="checkbox" value="{{ name }}"
               class="w-4 h-4 md:w-3.5 md:h-3.5"
               {% if name in selected_tags %}checked{% endif %}
               onchange="window.matterHub.toggleTag(this)">
        <span class="truncate">{{ name }}</span>
        <span class="text-gray-500 dark:text-gray-400 ml-auto text-sm md:text-xs">{{ cnt }}</span>
      </label>
    </li>
  {% endfor %}
</ul>
